program: scripts/train.py
method: random
metric:
  name: val_loss
  goal: minimize
parameters:
  lr:
    distribution: log_uniform_values
    min: 1e-4
    max: 3e-3
  batch_size:
    values: [256, 512, 1024]
  model_type:
    values: [vae, autoencoder]
  latent_dim:
    values: [8, 16, 32]
  beta:
    distribution: log_uniform_values
    min: 0.1
    max: 4.0